<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growth Team — Project Map</title>
<style>
  :root {
    --blue: #2563eb; --blue-light: #dbeafe; --blue-dark: #1e40af;
    --purple: #7c3aed; --purple-light: #ede9fe; --purple-dark: #5b21b6;
    --green: #16a34a; --green-light: #dcfce7;
    --red: #dc2626; --red-light: #fee2e2;
    --orange: #ea580c; --orange-light: #ffedd5;
    --yellow: #ca8a04; --yellow-light: #fef9c3;
    --gray: #6b7280; --gray-light: #f3f4f6; --gray-50: #f9fafb;
    --border: #e5e7eb;
    --text: #111827; --text-muted: #6b7280;
    --radius: 10px; --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; color: var(--text); font-size: 14px; line-height: 1.5; }
  
  /* HEADER */
  .header { background: linear-gradient(135deg, #1e3a5f 0%, #1a1a2e 100%); color: white; padding: 20px 32px 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.3); }
  .header-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .logo { width: 36px; height: 36px; background: var(--blue); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; color: white; }
  .header-title h1 { font-size: 18px; font-weight: 700; color: white; }
  .header-title p { font-size: 12px; color: rgba(255,255,255,.65); margin-top: 1px; }
  .last-updated { margin-left: auto; font-size: 11px; color: rgba(255,255,255,.45); }
  .nav { display: flex; gap: 2px; }
  .nav-btn { padding: 8px 16px; border: none; background: transparent; color: rgba(255,255,255,.65); cursor: pointer; font-size: 13px; font-weight: 500; border-radius: 8px 8px 0 0; transition: all .15s; white-space: nowrap; }
  .nav-btn:hover { background: rgba(255,255,255,.1); color: white; }
  .nav-btn.active { background: #f0f4f8; color: var(--text); font-weight: 600; }

  /* MAIN */
  .main { max-width: 1400px; margin: 0 auto; padding: 28px 28px; }
  .section { display: none; }
  .section.active { display: block; }

  /* OVERVIEW */
  .overview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .pod-summary { background: white; border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); cursor: pointer; transition: all .15s; }
  .pod-summary:hover { border-color: var(--blue); box-shadow: 0 4px 16px rgba(37,99,235,.1); transform: translateY(-2px); }
  .pod-summary.blue .pod-label { background: var(--blue); }
  .pod-summary.purple .pod-label { background: var(--purple); }
  .pod-label { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 8px; color: white; font-weight: 800; font-size: 13px; margin-bottom: 10px; }
  .pod-summary h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .pod-summary .funnel { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .pod-summary p { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 12px; }
  .pod-summary .count { font-size: 12px; font-weight: 600; color: var(--blue); }
  .kpi-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .kpi-pill { background: var(--gray-light); color: var(--text); padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .kpi-pill.blue { background: var(--blue-light); color: var(--blue-dark); }
  .kpi-pill.purple { background: var(--purple-light); color: var(--purple-dark); }

  /* SHARED TOOLS OVERVIEW */
  .shared-overview { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; }
  .shared-overview h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
  .tool-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--gray-light); }
  .tool-row:last-child { border: none; }
  .tool-emoji { font-size: 20px; }
  .tool-info h4 { font-size: 13px; font-weight: 600; }
  .tool-info p { font-size: 12px; color: var(--text-muted); }

  /* PROJECTS GRID */
  .projects-header { margin-bottom: 20px; }
  .projects-header h2 { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
  .projects-header .meta { font-size: 13px; color: var(--text-muted); display: flex; gap: 12px; align-items: center; }
  .funnel-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .funnel-badge.blue { background: var(--blue-light); color: var(--blue-dark); }
  .funnel-badge.purple { background: var(--purple-light); color: var(--purple-dark); }

  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 18px; }
  
  /* PROJECT CARD */
  .project-card { background: white; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; transition: box-shadow .15s; }
  .project-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,.08); }
  .card-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--gray-light); display: flex; align-items: flex-start; gap: 10px; }
  .card-emoji { font-size: 22px; flex-shrink: 0; line-height: 1; margin-top: 2px; }
  .card-title { flex: 1; }
  .card-title h3 { font-size: 14px; font-weight: 700; line-height: 1.3; margin-bottom: 3px; }
  .card-title .tagline { font-size: 12px; color: var(--text-muted); }
  .status-badge { flex-shrink: 0; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .status-badge.done { background: var(--green-light); color: var(--green); }
  .status-badge.progress { background: var(--blue-light); color: var(--blue-dark); }
  .status-badge.pending { background: var(--yellow-light); color: var(--yellow); }
  .status-badge.blocked { background: var(--red-light); color: var(--red); }
  .status-badge.maintain { background: #d1fae5; color: #065f46; }
  .status-badge.ongoing { background: #e0f2fe; color: #0369a1; }
  .status-badge.notstarted { background: var(--gray-light); color: var(--gray); }
  .status-badge.waiting { background: var(--orange-light); color: var(--orange); }

  .card-body { padding: 12px 16px; }
  .card-desc { font-size: 12.5px; color: var(--text-muted); line-height: 1.6; margin-bottom: 10px; }
  
  .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--text-muted); margin-bottom: 5px; margin-top: 10px; }
  
  .pills { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
  .pill { padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; background: var(--gray-light); color: var(--text-muted); }
  
  /* TASKS */
  .task-list { list-style: none; display: flex; flex-direction: column; gap: 3px; }
  .task-item { display: flex; align-items: flex-start; gap: 6px; padding: 3px 0; }
  .task-status { flex-shrink: 0; padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: 700; margin-top: 1px; }
  .task-status.DONE { background: var(--green-light); color: var(--green); }
  .task-status.DOING, .task-status["IN PROGRESS"] { background: var(--blue-light); color: var(--blue-dark); }
  .task-status.TODO { background: var(--gray-light); color: var(--gray); }
  .task-status.BLOCKED { background: var(--red-light); color: var(--red); }
  .task-status.WAITING { background: var(--orange-light); color: var(--orange); }
  .task-status.PENDING { background: var(--yellow-light); color: var(--yellow); }
  .task-label { font-size: 12px; color: var(--text); line-height: 1.4; }
  
  /* BLOCKERS */
  .blockers { background: var(--red-light); border-radius: var(--radius-sm); padding: 8px 10px; margin-top: 8px; }
  .blockers .bl-title { font-size: 10px; font-weight: 700; color: var(--red); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .blockers ul { list-style: none; }
  .blockers li { font-size: 12px; color: #991b1b; padding: 2px 0; }
  .blockers li::before { content: "⚠ "; }

  /* NEXT STEPS */
  .next-steps { background: #f0f9ff; border-radius: var(--radius-sm); padding: 8px 10px; margin-top: 8px; }
  .next-steps .ns-title { font-size: 10px; font-weight: 700; color: #0284c7; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .next-steps ul { list-style: none; }
  .next-steps li { font-size: 12px; color: #0369a1; padding: 2px 0; }
  .next-steps li::before { content: "→ "; font-weight: 700; }

  /* KEY DATA / RESULTS */
  .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; margin-bottom: 6px; }
  .data-card { background: var(--gray-50); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 10px; text-align: center; }
  .data-card .val { font-size: 13px; font-weight: 700; color: var(--text); }
  
  /* BUDGET */
  .budget-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .budget-item { background: var(--gray-50); border-radius: var(--radius-sm); padding: 6px 10px; display: flex; justify-content: space-between; align-items: center; }
  .budget-item .vert { font-size: 11px; font-weight: 700; color: var(--text); }
  .budget-item .amt { font-size: 11px; color: var(--blue-dark); font-weight: 600; }

  /* JOURNEY */
  .journey { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; margin: 4px 0; }
  .journey-step { background: var(--purple-light); color: var(--purple-dark); padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .journey-arrow { color: var(--text-muted); font-size: 12px; }

  /* REQUIREMENTS */
  .req-grid { display: flex; flex-wrap: wrap; gap: 4px; }
  .req-pill { background: #fef3c7; color: #92400e; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }

  /* FLOWS */
  .flows { display: flex; flex-wrap: wrap; gap: 4px; }
  .flow-item { padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .flow-item.done { background: var(--green-light); color: var(--green); }
  .flow-item.pending { background: var(--gray-light); color: var(--gray); }

  /* OPEN QUESTIONS */
  .open-q { background: #fffbeb; border-left: 3px solid #f59e0b; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 8px 10px; margin-top: 8px; }
  .open-q .oq-title { font-size: 10px; font-weight: 700; color: #b45309; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .open-q li { font-size: 12px; color: #78350f; list-style: none; padding: 2px 0; }
  .open-q li::before { content: "? "; font-weight: 700; }

  /* KEY INSIGHTS */
  .insights { background: #f0fdf4; border-left: 3px solid var(--green); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 8px 10px; margin-top: 8px; }
  .insights .i-title { font-size: 10px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .insights li { font-size: 12px; color: #166534; list-style: none; }

  /* PICS */
  .pics { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--gray-light); }
  .pic-tag { background: var(--gray-50); border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; font-size: 11px; }
  .pic-tag .pic-name { font-weight: 600; color: var(--text); }
  .pic-tag .pic-role { color: var(--text-muted); }

  /* PERSONNEL */
  .personnel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; margin: 16px 0; }
  .person-card { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .person-role { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); margin-bottom: 3px; }
  .person-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .person-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

  /* NOTE BOX */
  .note-box { background: #fffbeb; border: 1px dashed #f59e0b; border-radius: var(--radius-sm); padding: 8px 12px; font-size: 12px; color: #78350f; margin: 12px 0; font-style: italic; }
  .footer-note { background: var(--gray-50); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 12px; color: var(--text-muted); margin-top: 20px; }

  /* SHARED TOOLS SECTION */
  .shared-tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(520px, 1fr)); gap: 20px; }
  .pod-usage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .pod-usage-col { background: var(--gray-50); border-radius: var(--radius-sm); padding: 8px 10px; }
  .pod-usage-col .pu-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .pod-usage-col.p1 .pu-label { color: var(--blue-dark); }
  .pod-usage-col.p2 .pu-label { color: var(--purple-dark); }
  .pod-usage-col li { font-size: 11px; color: var(--text-muted); list-style: none; padding: 1px 0; }
  .pod-usage-col li::before { content: "· "; }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 24px 0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">G</div>
    <div class="header-title">
      <h1 id="site-title">Growth Team — Project Map</h1>
      <p id="site-subtitle">Loading...</p>
    </div>
    <div class="last-updated" id="last-updated"></div>
  </div>
  <div class="nav" id="nav"></div>
</div>

<div class="main" id="main">
  <div style="padding:40px;text-align:center;color:#6b7280">Đang tải dữ liệu...</div>
</div>

<script>
// ─── UTILITIES ───────────────────────────────────────────────────────────────
function statusClass(s){
  if(!s) return 'notstarted';
  const low = s.toLowerCase();
  if(low.includes('done') && !low.includes('ongoing')) return 'done';
  if(low.includes('maintain')) return 'maintain';
  if(low.includes('ongoing')) return 'ongoing';
  if(low.includes('progress') || low.includes('in progress')) return 'progress';
  if(low.includes('pending')) return 'pending';
  if(low.includes('block')) return 'blocked';
  if(low.includes('waiting')) return 'waiting';
  if(low.includes('not started')) return 'notstarted';
  return 'progress';
}

function taskClass(s){
  const m = {
    'DONE':'DONE','DOING':'DOING','IN PROGRESS':'DOING','TODO':'TODO',
    'NOT STARTED':'TODO','BLOCKED':'BLOCKED','WAITING':'WAITING',
    'PENDING':'PENDING','TESTED':'DONE','CHƯA LÀM':'TODO'
  };
  return m[s] || 'TODO';
}

function pills(arr, cls=''){
  if(!arr||!arr.length) return '';
  return `<div class="pills">${arr.map(a=>`<span class="pill ${cls}">${a}</span>`).join('')}</div>`;
}

function renderPics(pics){
  if(!pics||!pics.length) return '';
  return `<div class="pics">${pics.map(p=>
    `<span class="pic-tag"><span class="pic-name">${p.name}</span>${p.role?`<span class="pic-role"> · ${p.role}</span>`:''}</span>`
  ).join('')}</div>`;
}

function renderTasks(tasks){
  if(!tasks||!tasks.length) return '';
  return `
    <div class="section-label">Task Progress</div>
    <ul class="task-list">${tasks.map(t=>`
      <li class="task-item">
        <span class="task-status ${taskClass(t.status)}">${t.status}</span>
        <span class="task-label">${t.label}</span>
      </li>`).join('')}
    </ul>`;
}

function renderBlockers(arr){
  if(!arr||!arr.length) return '';
  return `<div class="blockers"><div class="bl-title">🚫 Blockers</div><ul>${arr.map(b=>`<li>${b}</li>`).join('')}</ul></div>`;
}

function renderNextSteps(arr){
  if(!arr||!arr.length) return '';
  return `<div class="next-steps"><div class="ns-title">Next Steps</div><ul>${arr.map(b=>`<li>${b}</li>`).join('')}</ul></div>`;
}

// ─── PROJECT CARD ────────────────────────────────────────────────────────────
function renderProject(p){
  let extras = '';

  // Budget
  if(p.budget&&p.budget.length)
    extras += `<div class="section-label">Budget Q2 2026</div>
      <div class="budget-grid">${p.budget.map(b=>`<div class="budget-item"><span class="vert">${b.vertical}</span><span class="amt">${b.amount}</span></div>`).join('')}</div>`;

  // Key data
  if(p.key_data&&p.key_data.length)
    extras += `<div class="section-label">Key Data</div>
      <div class="data-grid">${p.key_data.map(d=>`<div class="data-card"><div class="val">${d}</div></div>`).join('')}</div>`;

  // Results
  if(p.results&&p.results.length)
    extras += `<div class="section-label">Results</div>
      <div class="data-grid">${p.results.map(d=>`<div class="data-card"><div class="val">${d}</div></div>`).join('')}</div>`;

  // Buyer journey
  if(p.buyer_journey&&p.buyer_journey.length)
    extras += `<div class="section-label">Buyer Journey</div>
      <div class="journey">${p.buyer_journey.map((s,i)=>`<span class="journey-step">${s}</span>${i<p.buyer_journey.length-1?'<span class="journey-arrow">→</span>':''}`).join('')}</div>`;

  // Requirements
  if(p.requirements&&p.requirements.length)
    extras += `<div class="section-label">11 Requirements</div><div class="req-grid">${p.requirements.map(r=>`<span class="req-pill">${r}</span>`).join('')}</div>`;

  // Features
  if(p.features&&p.features.length)
    extras += `<div class="section-label">Features in Scope</div>${pills(p.features)}`;

  // Issues found
  if(p.issues_found&&p.issues_found.length)
    extras += `<div class="section-label">Issues Found</div><ul>${p.issues_found.map(i=>`<li style="font-size:12px;color:#6b7280;padding:2px 0 2px 12px">• ${i}</li>`).join('')}</ul>`;

  // Buyer done
  if(p.buyer_done&&p.buyer_done.length)
    extras += `<div class="section-label">Buyer — Đã làm</div><ul>${p.buyer_done.map(i=>`<li style="font-size:12px;color:#166534;padding:2px 0 2px 12px">✓ ${i}</li>`).join('')}</ul>`;
  if(p.seller_status)
    extras += `<div style="font-size:12px;color:#6b7280;margin-top:4px;font-style:italic">Seller: ${p.seller_status}</div>`;

  // Chatbot flows
  if(p.flows&&p.flows.length)
    extras += `<div class="section-label">Flows Status</div>
      <div class="flows">${p.flows.map(f=>`<span class="flow-item ${f.done?'done':'pending'}">${f.done?'✅':'❌'} ${f.label}</span>`).join('')}</div>`;

  // Key insights
  if(p.key_insights&&p.key_insights.length)
    extras += `<div class="insights"><div class="i-title">💡 Key Insight</div><ul>${p.key_insights.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;

  // Open questions
  if(p.open_questions&&p.open_questions.length)
    extras += `<div class="open-q"><div class="oq-title">Open Questions</div><ul>${p.open_questions.map(q=>`<li>${q}</li>`).join('')}</ul></div>`;

  return `
  <div class="project-card">
    <div class="card-header">
      <div class="card-emoji">${p.emoji}</div>
      <div class="card-title">
        <h3>${p.name}</h3>
        <div class="tagline">${p.tagline}</div>
      </div>
      <span class="status-badge ${statusClass(p.status)}">${p.status}</span>
    </div>
    <div class="card-body">
      <div class="card-desc">${p.description}</div>
      ${p.kpis&&p.kpis.length?`<div class="section-label">KPIs</div>${pills(p.kpis,'blue')}`:''}
      ${p.channels&&p.channels.length?`<div class="section-label">Channels</div>${pills(p.channels)}`:''}
      ${extras}
      ${renderTasks(p.tasks)}
      ${renderBlockers(p.blockers)}
      ${renderNextSteps(p.next_steps)}
      ${renderPics(p.pics)}
    </div>
  </div>`;
}

// ─── POD SECTION ─────────────────────────────────────────────────────────────
function renderPodSection(pod){
  const colorClass = pod.color || 'blue';
  return `
    <div class="projects-header">
      <h2>${pod.label} — ${pod.name}</h2>
      <div class="meta">
        <span class="funnel-badge ${colorClass}">${pod.funnel}</span>
        <span>${pod.project_count} projects</span>
      </div>
      <p style="font-size:13px;color:#6b7280;margin-top:6px;max-width:720px">${pod.description}</p>
    </div>
    ${pod.note?`<div class="note-box">${pod.note}</div>`:''}
    ${pod.kpis&&pod.kpis.length?`<div style="margin-bottom:14px"><span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#6b7280">KPIs</span><div style="margin-top:4px">${pills(pod.kpis,colorClass)}</div></div>`:''}
    ${pod.channels&&pod.channels.length?`<div style="margin-bottom:20px"><span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#6b7280">Channels</span><div style="margin-top:4px">${pills(pod.channels)}</div></div>`:''}
    <div class="section-label" style="margin-bottom:8px">Personnel</div>
    <div class="personnel-grid">
      ${pod.personnel.map(p=>`
        <div class="person-card">
          <div class="person-role">${p.role}</div>
          <div class="person-name">${p.name}</div>
          <div class="person-desc">${p.description}</div>
        </div>`).join('')}
    </div>
    <div class="divider"></div>
    <div class="projects-grid">${pod.projects.map(renderProject).join('')}</div>
    ${pod.footer_note?`<div class="footer-note">${pod.footer_note}</div>`:''}`;
}

// ─── SHARED TOOLS ────────────────────────────────────────────────────────────
function renderSharedTool(t){
  return `
  <div class="project-card">
    <div class="card-header">
      <div class="card-emoji">${t.emoji}</div>
      <div class="card-title">
        <h3>${t.name}</h3>
        <div class="tagline">${t.tagline}</div>
      </div>
      <span class="status-badge ${statusClass(t.status)}">${t.status}</span>
    </div>
    <div class="card-body">
      <div class="card-desc">${t.description}</div>
      ${t.channels&&t.channels.length?`<div class="section-label">Channels</div>${pills(t.channels)}`:''}
      ${t.kpis&&t.kpis.length?`<div class="section-label">KPIs</div>${pills(t.kpis,'blue')}`:''}
      ${t.requirements&&t.requirements.length?`<div class="section-label">Requirements</div><div class="req-grid">${t.requirements.map(r=>`<span class="req-pill">${r}</span>`).join('')}</div>`:''}
      ${t.pod_usage?`<div class="section-label">Cách 2 pods dùng</div>
        <div class="pod-usage-grid">
          <div class="pod-usage-col p1"><div class="pu-label">Pod 1 — Acquisition</div><ul>${(t.pod_usage.p1||[]).map(i=>`<li>${i}</li>`).join('')}</ul></div>
          <div class="pod-usage-col p2"><div class="pu-label">Pod 2 — Engagement</div><ul>${(t.pod_usage.p2||[]).map(i=>`<li>${i}</li>`).join('')}</ul></div>
        </div>`:''}
      ${renderTasks(t.tasks)}
      ${renderBlockers(t.blockers)}
      ${renderNextSteps(t.next_steps)}
      ${renderPics(t.pics)}
    </div>
  </div>`;
}

// ─── OVERVIEW ────────────────────────────────────────────────────────────────
function renderOverview(data){
  return `
    <div class="overview-grid">
      ${data.pods.map(pod=>`
        <div class="pod-summary ${pod.color}" onclick="showTab('${pod.id}')">
          <div class="pod-label">${pod.label}</div>
          <div class="funnel">${pod.funnel}</div>
          <h3>${pod.name}</h3>
          <p>${pod.description}</p>
          <div class="count">📁 ${pod.project_count} projects</div>
          <div class="kpi-list">${pod.kpis.slice(0,4).map(k=>`<span class="kpi-pill ${pod.color}">${k}</span>`).join('')}</div>
        </div>`).join('')}
      <div class="shared-overview">
        <h3>🔗 Shared Tools & Platforms</h3>
        ${data.shared_tools.map(t=>`
          <div class="tool-row">
            <div class="tool-emoji">${t.emoji}</div>
            <div class="tool-info">
              <h4>${t.name}</h4>
              <p>${t.tagline}</p>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
let currentData = null;

function showTab(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const sec = document.getElementById('section-'+id);
  if(sec) sec.classList.add('active');
  const btn = document.getElementById('btn-'+id);
  if(btn) btn.classList.add('active');
}

function render(data){
  currentData = data;
  document.getElementById('site-title').textContent = data.meta.title;
  document.getElementById('site-subtitle').textContent = data.meta.team_summary;
  document.getElementById('last-updated').textContent = 'Updated: ' + data.meta.last_updated;

  // Nav
  const navTabs = [
    {id:'overview', label:'📋 Overview SoW'},
    ...data.pods.map(p=>({id:p.id, label:p.nav_label})),
    {id:'shared', label:'🔗 Shared Tools & Platforms'}
  ];
  document.getElementById('nav').innerHTML = navTabs.map(t=>
    `<button class="nav-btn" id="btn-${t.id}" onclick="showTab('${t.id}')">${t.label}</button>`
  ).join('');

  // Sections
  const sections = [
    `<div class="section active" id="section-overview">${renderOverview(data)}</div>`,
    ...data.pods.map(p=>`<div class="section" id="section-${p.id}">${renderPodSection(p)}</div>`),
    `<div class="section" id="section-shared">
      <div class="projects-header"><h2>🔗 Shared Tools & Platforms</h2><div class="meta"><span>2 tools · Dùng chung cả 2 pods</span></div></div>
      <div class="shared-tools-grid">${data.shared_tools.map(renderSharedTool).join('')}</div>
    </div>`
  ];
  document.getElementById('main').innerHTML = sections.join('');
  document.getElementById('btn-overview').classList.add('active');
}

// ─── LOAD DATA ───────────────────────────────────────────────────────────────
fetch('data.json?v=' + Date.now())
  .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(render)
  .catch(err => {
    document.getElementById('main').innerHTML = `<div style="padding:40px;text-align:center;color:#dc2626">
      <p style="font-size:16px;font-weight:700">Không thể tải data.json</p>
      <p style="margin-top:8px;color:#6b7280">${err.message}</p>
      <p style="margin-top:8px;color:#6b7280;font-size:12px">Trang này cần được serve qua HTTP server (GitHub Pages). Không hoạt động khi mở file:// trực tiếp.</p>
    </div>`;
  });
</script>
</body>
</html>
